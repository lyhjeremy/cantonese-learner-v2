name: Build daily lessons and deploy to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 22 * * *" # 06:00 HKT (Cloudflare/GitHub cron is UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  models: read # free GitHub Models inference for the Cantonese rewrite

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Only the runtime deps (to-jyutping, @anthropic-ai/sdk) are needed;
      # skip devDeps (Playwright).
      - run: npm install --omit=dev --no-audit --no-fund
      - name: Compute Hong Kong build date
        run: |
          echo "BUILD_DATE=$(TZ=Asia/Hong_Kong date +%F)" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(TZ=Asia/Hong_Kong date --iso-8601=seconds)" >> "$GITHUB_ENV"
      # Keyless by default: fetch free RSS news, chunk, rule-convert to
      # Cantonese, add jyutping. Fail-soft -> if it writes nothing, the site
      # serves samples.
      # RECOMMENDED: set an ANTHROPIC_API_KEY repo secret to switch the rewrite
      # to Claude (Opus 4.8) + an independent Claude verifier pass — see README.
      # OPTIONAL: set a WECHAT_FEED_URL secret (an RSS bridge for the WeChat
      # 公眾號) to mix Bain Portfolio News lessons in alongside RTHK.
      - name: Build today's lessons
        run: node scripts/build-lessons.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }} # free GitHub Models rewrite tier
          WECHAT_FEED_URL: ${{ secrets.WECHAT_FEED_URL }}
          WECHAT_SOURCE_NAME: ${{ vars.WECHAT_SOURCE_NAME }}
          BAIN_NEWS_QUERY: ${{ vars.BAIN_NEWS_QUERY }}
      # Pre-synthesise neural Cantonese audio (free Microsoft edge-tts voices)
      # for every sentence, so playback doesn't rely on the robotic browser
      # voice. Fail-soft: on any failure the site falls back to browser TTS.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install edge-tts
      - name: Synthesise neural Cantonese audio
        run: python3 scripts/build_audio.py
      - uses: actions/configure-pages@v5
      - name: Upload frontend/ (including generated today.json) as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4
