name: Keep-alive

# GitHub automatically DISABLES scheduled workflows in a public repo after 60
# days with no new commits (a scheduled run itself does not count). That would
# silently stop the daily news update. This job makes a tiny commit twice a
# month, which counts as repository activity and resets that 60-day timer for
# every scheduled workflow — so the daily build in pages.yml keeps running
# forever without anyone touching the repo.
#
# The commit is authored as the repo owner and does not trigger other workflows
# (pushes made with the built-in token don't), so it won't cause extra deploys.

on:
  schedule:
    - cron: "27 2 1,15 * *" # 02:27 UTC on the 1st and 15th of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record a keep-alive timestamp and commit
        run: |
          mkdir -p .github
          date -u +"Last keep-alive: %Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
          git config user.name "Jeremy Lee"
          git config user.email "lyhjeremy@gmail.com"
          git add .github/keepalive.txt
          git commit -m "chore: keep-alive" || { echo "nothing to commit"; exit 0; }
          git push
